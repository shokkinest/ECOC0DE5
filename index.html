<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ECOC0DE5</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<section id="startScreen" class="screen active">
  <div class="background-layer start-bg"></div>
  <div class="screen-overlay"></div>

  <div class="screen-content">
    <h1 class="game-title">ECOC0DE5</h1>
    <button id="startBtn" class="main-btn">START MISSION</button>
  </div>
</section>

<section id="insideScreen" class="screen">
  <div class="background-layer inside-bg"></div>
  <div class="screen-overlay"></div>

  <div class="screen-content">
    <h2>Initializing Environmental Protocols...</h2>
    <div id="insideCountdown" class="countdown">10</div>
  </div>
</section>

<section id="gameScreen" class="screen">
  <div class="background-layer computer-bg"></div>
  <div class="screen-overlay"></div>

  <div class="game-ui">

    <div class="top-bar">
      <div id="status-message">SYSTEM STATUS: RESTORATION IN PROGRESS</div>
    </div>

    <div class="levels-panel">

      <div class="level-row">
        <div>Deforestation reboot code:</div>
        <input id="lvl1" maxlength="4">
        <div id="c1" class="status-circle"></div>
      </div>

      <div class="level-row">
        <div>Water scarcity reboot code:</div>
        <input id="lvl2" maxlength="4">
        <div id="c2" class="status-circle"></div>
      </div>

      <div class="level-row">
        <div>Floods reboot code:</div>
        <input id="lvl3" maxlength="4">
        <div id="c3" class="status-circle"></div>
      </div>

      <div class="level-row">
        <div>Ocean pollution reboot code:</div>
        <input id="lvl4" maxlength="4">
        <div id="c4" class="status-circle"></div>
      </div>

      <div class="level-row">
        <div>Sustainable consumption habits reboot code:</div>
        <input id="lvl5" maxlength="4">
        <div id="c5" class="status-circle"></div>
      </div>

    </div>

    <button id="finalBtn" class="main-btn" disabled>SYSTEM REBOOT</button>

  </div>
</section>

<section id="winScreen" class="screen">
  <div class="background-layer win-bg"></div>
  <div class="screen-overlay"></div>

  <div class="screen-content">
    <h1>SYSTEM RESTORED</h1>
    <p>The planet is breathing again.</p>
  </div>
</section>

<audio id="successSound" src="sounds/success.mp3"></audio>
<audio id="winSound" src="sounds/win.mp3"></audio>

</body>
</html>
